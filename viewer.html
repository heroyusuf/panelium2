<!DOCTYPE HTML>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalyan Resort — Sanal Tur</title>
    <link rel="stylesheet" href="pannellum.css"/>
    <link rel="stylesheet" href="skin.css"/>
    <script type="text/javascript" src="pannellum.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #panorama { width: 100vw; height: 100vh; }

        /* Custom hotspot icon */
        .pnlm-hotspot.custom-icon-hs {
            background-image: none !important;
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
            width: 40px !important;
            height: 40px !important;
        }
        .pnlm-hotspot.custom-icon-hs:hover { background-color: transparent !important; }
        .pnlm-hotspot.custom-icon-hs img { display: block; width: 40px; height: 40px; cursor: pointer; }

        /* Hide pannellum info bar */
        .pnlm-panorama-info, .pnlm-title-box, .pnlm-author-box { display: none !important; }

        /* Hotspot video modal (separate from skin popup — triggered by panorama hotspots) */
        #video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        #video-modal.is-open { display: flex; }
        #video-modal-content {
            position: relative;
            width: 80%;
            max-width: 960px;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        #video-container { position: absolute; inset: 0; }
        #video-modal iframe,
        #video-modal video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
        #close-video-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: #ffcc00;
            color: #000;
            font-weight: bold;
            font-size: 20px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #333;
            z-index: 10001;
            transition: background 0.2s;
        }
        #close-video-modal:hover { background: #fff; }
    </style>
</head>
<body>

<div id="panorama"></div>

<!-- Hotspot Video Modal -->
<div id="video-modal">
    <div id="video-modal-content">
        <div id="close-video-modal" onclick="closeVideoModal()">✕</div>
        <div id="video-container"></div>
    </div>
</div>

<script src="skin-engine.js"></script>
<script>
    var viewer;
    var configData = null;
    var currentScene = null;
    var arInterval = null;
    var arTotalDeg = 0;

    // ── Custom hotspot icon renderer ─────────────────────────
    window.customIconTooltipFunc = function (hotSpotDiv, args) {
        hotSpotDiv.classList.remove('pnlm-info', 'pnlm-scene', 'pnlm-sprite');
        hotSpotDiv.classList.add('custom-icon-hs');
        hotSpotDiv.innerHTML = '';
        var img = document.createElement('img');
        img.src = args;
        img.style.cssText = 'display:block;width:100%;height:100%;cursor:pointer;';
        hotSpotDiv.appendChild(img);
    };

    // ── YouTube URL normalizer ───────────────────────────────
    function parseYouTubeUrl(url) {
        if (!url) return url;
        var m = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
        if (m && m[2].length === 11) return 'https://www.youtube.com/embed/' + m[2];
        return url;
    }

    // ── Hotspot video modal (not the skin popup) ─────────────
    function videoClickHandler(e, url) { openVideoModal(url); }

    function openVideoModal(url) {
        url = parseYouTubeUrl(url);
        var cont = document.getElementById('video-container');
        cont.innerHTML = '';
        var ext = url.split('.').pop().toLowerCase();
        if (ext === 'mp4' || ext === 'webm' || ext === 'ogg') {
            var v = document.createElement('video');
            v.src = url;
            v.controls = true;
            v.autoplay = true;
            v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border-radius:8px;';
            cont.appendChild(v);
        } else {
            var sep = url.indexOf('?') !== -1 ? '&' : '?';
            cont.innerHTML = '<iframe src="' + url + sep + 'autoplay=1&mute=0" allow="autoplay;fullscreen;accelerometer;gyroscope;picture-in-picture" allowfullscreen></iframe>';
        }
        document.getElementById('video-modal').classList.add('is-open');
    }

    function closeVideoModal() {
        document.getElementById('video-container').innerHTML = '';
        document.getElementById('video-modal').classList.remove('is-open');
    }

    // ── Auto-rotate ──────────────────────────────────────────
    function startAutoRotate(speed, autoScene) {
        arTotalDeg = 0;
        var lastTime = Date.now();
        arInterval = setInterval(function () {
            if (!viewer) return;
            var now = Date.now();
            var dt = (now - lastTime) / 1000;
            lastTime = now;
            var step = speed * dt;

            if (autoScene) {
                arTotalDeg += step;
                if (arTotalDeg >= 360) {
                    arTotalDeg = 0;
                    var ids = Object.keys(configData.scenes);
                    var idx = ids.indexOf(currentScene);
                    var next = ids[(idx + 1) % ids.length];
                    viewer.loadScene(next);
                    return;
                }
            }
            if (isNaN(step) || step > 10) return;
            var cy = viewer.getYaw();
            if (!isNaN(cy)) viewer.setYaw(cy + step, false);
        }, 16);
    }

    // ── Bootstrap ────────────────────────────────────────────
    fetch('config.json?t=' + Date.now())
        .then(function (r) { return r.json(); })
        .then(function (data) {
            configData = data;

            // Prepare hotspots: attach click/icon handlers
            for (var sid in configData.scenes) {
                var sc = configData.scenes[sid];
                if (!sc.hotSpots) continue;
                sc.hotSpots.forEach(function (hs) {
                    if (hs.popupVideo) {
                        hs.clickHandlerFunc = videoClickHandler;
                        hs.clickHandlerArgs = hs.popupVideo;
                    }
                    if (hs.customIconImg) {
                        hs.createTooltipFunc = window.customIconTooltipFunc;
                        hs.createTooltipArgs = hs.customIconImg;
                    }
                });
            }

            // Init Pannellum viewer
            viewer = pannellum.viewer('panorama', configData);

            currentScene = configData.default.firstScene;

            viewer.on('scenechange', function (sceneId) {
                currentScene = sceneId;
                arTotalDeg = 0;
                // SkinEngine tracks its own state via its own scenechange listener
            });

            viewer.on('mousedown', function () { arTotalDeg = 0; });

            // Init SkinEngine — takes over all UI rendering
            SkinEngine.init(configData, viewer);

            // Auto-rotate
            var arCfg = configData.customAutoRotate || {};
            if (arCfg.enabled) {
                startAutoRotate(arCfg.speed || 5, !!arCfg.autoScene);
            }
        })
        .catch(function (err) {
            console.error('Config error', err);
            alert('Tur yapılandırması yüklenemedi.');
        });
</script>
</body>
</html>
